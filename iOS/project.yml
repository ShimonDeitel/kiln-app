name: Kiln
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
targets:
  Kiln:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kiln
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ceramicslog
        INFOPLIST_FILE: Kiln/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Kiln - Ceramics Log"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Kiln/Info.plist
      properties:
        CFBundleDisplayName: "Kiln - Ceramics Log"
        ITSAppUsesNonExemptEncryption: false
  KilnTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KilnTests
    dependencies:
      - target: Kiln
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ceramicslog.tests
  KilnUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KilnUITests
    dependencies:
      - target: Kiln
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ceramicslog.uitests
schemes:
  Kiln:
    build:
      targets:
        Kiln: all
    test:
      targets:
        - KilnTests
        - KilnUITests
    run:
      config: Debug
